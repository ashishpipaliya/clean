name: clean
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  
  # Dependency Injection
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  
  # Functional Programming
  fpdart: ^1.2.0
  
  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  
  # Network
  dio: ^5.9.2
  retrofit: ^4.9.2
  
  # Storage
  hive_ce: ^2.19.3
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5
  
  # Environment Variables
  envied: ^1.3.3
  
  # Routing
  go_router: ^14.6.2
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.1
  
  # Connectivity
  internet_connection_checker_plus: ^2.5.2
  
  # Animations
  flutter_animate: ^4.5.0
  splash_master: ^0.0.3
  encrypt: ^5.0.3
  crypto: ^3.0.7
  
  # Pagination
  infinite_scroll_pagination: ^4.1.0

  # Image Caching
  cached_network_image: ^3.4.1

  # Logging
  logger: ^2.5.0
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.13.1
  
  # Code Generators
  build_runner: ^2.12.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  injectable_generator: ^2.12.1
  envied_generator: ^1.3.3
  hive_ce_generator: ^1.11.1
  retrofit_generator: ^10.2.3
  analyzer: ^10.0.1
  args: ^2.7.0
  path: ^1.9.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/flutter_logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/flutter_logo.png
  color_dark: "#FFFFFF"
  image_dark: assets/images/flutter_logo.png
  android_12:
    image: assets/images/flutter_logo.png
    icon_background_color: "#FFFFFF"
    image_dark: assets/images/flutter_logo.png
    icon_background_color_dark: "#FFFFFF"
  fullscreen: true
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
