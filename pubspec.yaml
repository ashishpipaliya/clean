  internet_connection_checker_plus: ^2.5.2
  
  # Animations
  flutter_animate: ^4.5.0
  retrofit_generator: ^10.2.3
  encrypt: ^5.0.3
  crypto: ^3.0.7
  
  # Pagination
  infinite_scroll_pagination: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generators
  build_runner: ^2.12.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  injectable_generator: ^2.12.1
  envied_generator: ^1.3.3
  hive_ce_generator: ^1.11.1
  analyzer: ^10.0.1
  args: ^2.7.0
  path: ^1.9.1

flutter:
  uses-material-design: true
  generate: true

  
  
  
  

  
  

  
  

  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
  
