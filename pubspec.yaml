  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.5
  
  # Environment Variables
  envied: ^1.3.3
  
  # Routing
  go_router: ^14.6.2
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.1
  
