name: clean
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.1.1
  
  # Dependency Injection
  injectable: ^2.7.1+4
  get_it: ^9.2.1
  
  # Functional Programming
  fpdart: ^1.2.0
  
  # Code Generation
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  
  # Network
  dio: ^5.9.2
